<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Calculadora financiera - Mi Web</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>Calculadora de Hipoteca</h1></header>
  <main>
    <label>Importe préstamo (€): <input id="amount" type="number" value="100000"></label>
    <label>Tasa anual (%): <input id="rate" type="number" step="0.01" value="3.5"></label>
    <label>Años: <input id="years" type="number" value="25"></label>
    <button id="calc">Calcular cuota</button>
    <div id="result"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
